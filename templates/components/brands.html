<section class="portfolio-section brand-strip-section">
  <div class="container-fluid one">
    <div class="row">
      <div class="col-lg-12 pl--95 mb-60">
        <div class="portfolio-tab-area">
          <div class="section-title1 two white">
            <span>Αντιπροσωπείες</span>
            <h2>Reliable quality!</h2>
          </div>
          <div class="d-flex flex-lg-row flex-wrap flex-column gap-3">
            <a class="primary-btn4 btn-hover" href="{{ url_for('main.products') }}">
              Product Manufacturing and Packaging lines
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.4816 1.06282L1.29497 11.2495L0.543457 10.4979L10.4832 0.558135H1.44338V0.505811" fill="currentColor"></path></svg>
              <span></span>
            </a>
            <a class="primary-btn4 btn-hover" href="{{ url_for('main.quality_control') }}">
              Quality control
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.4816 1.06282L1.29497 11.2495L0.543457 10.4979L10.4832 0.558135H1.44338V0.505811" fill="currentColor"></path></svg>
              <span></span>
            </a>
            <a class="primary-btn4 btn-hover" href="{{ url_for('main.supply_chain') }}">
              Supply Chain
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.4816 1.06282L1.29497 11.2495L0.543457 10.4979L10.4832 0.558135H1.44338V0.505811" fill="currentColor"></path></svg>
              <span></span>
            </a>
          </div>
        </div>
      </div>
      <div class="col-lg-12">
        <div class="brand-strip-viewport">
          <div class="brand-strip-track">
            {% for brand in brand_logos %}
            <a class="brand-strip-tile" href="{{ brand.link }}" target="_blank" rel="noopener">
              <span class="brand-strip-img">
                <img src="{{ brand.img }}" alt="{{ brand.name }}" loading="lazy">
              </span>
              <span class="brand-strip-arrow" aria-hidden="true">
                <img src="https://europack.gr/wp-content/uploads/2025/06/right-arrow.png" alt="" loading="lazy">
              </span>
              <span class="brand-strip-caption">
                <span class="brand-strip-category">{{ brand.category_label }}</span>
                <span class="brand-strip-name">{{ brand.name }}</span>
              </span>
            </a>
            {% endfor %}
            {% for brand in brand_logos %}
            <a class="brand-strip-tile" href="{{ brand.link }}" target="_blank" rel="noopener" aria-hidden="true" tabindex="-1">
              <span class="brand-strip-img">
                <img src="{{ brand.img }}" alt="" loading="lazy">
              </span>
              <span class="brand-strip-arrow" aria-hidden="true">
                <img src="https://europack.gr/wp-content/uploads/2025/06/right-arrow.png" alt="" loading="lazy">
              </span>
              <span class="brand-strip-caption">
                <span class="brand-strip-category">{{ brand.category_label }}</span>
                <span class="brand-strip-name">{{ brand.name }}</span>
              </span>
            </a>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
