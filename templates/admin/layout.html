<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin | {{ config.SITE_NAME }}{% endblock %}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}">
  <style>
    :root {
      --admin-primary: #1a3c5e;
      --admin-accent: #d64545;
      --admin-bg: #f4f6f8;
      --admin-border: #dde3e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--admin-bg);
      color: #23303d;
    }
    a { color: var(--admin-primary); }
    .admin-topbar {
      background: var(--admin-primary);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-topbar a { color: #fff; text-decoration: none; }
    .admin-topbar .brand { font-weight: 700; letter-spacing: .3px; }
    .admin-topbar .nav-links { display: flex; gap: 18px; align-items: center; font-size: 14px; }
    .admin-wrap {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .admin-card {
      background: #fff;
      border: 1px solid var(--admin-border);
      border-radius: 10px;
      padding: 28px;
    }
    .admin-auth-wrap {
      max-width: 420px;
      margin: 80px auto;
      padding: 0 20px;
    }
    h1.admin-title { font-size: 22px; margin: 0 0 6px; }
    p.admin-subtitle { color: #66788c; margin: 0 0 24px; font-size: 14px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #445261; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--admin-border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .field-errors { color: var(--admin-accent); font-size: 12px; margin-top: 4px; }
    .btn {
      display: inline-block;
      background: var(--admin-primary);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { opacity: .92; }
    .btn-danger { background: var(--admin-accent); }
    .btn-ghost { background: transparent; color: var(--admin-primary); border: 1px solid var(--admin-border); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .flash-container { max-width: 960px; margin: 20px auto 0; padding: 0 20px; }
    .admin-auth-wrap .flash-container { max-width: 420px; margin: 0 auto 16px; padding: 0; }
    .flash-message {
      padding: 10px 14px;
      border-radius: 6px;
      color: #fff;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .flash-success { background: #1aa37a; }
    .flash-danger { background: #d64545; }
    .news-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .news-table th, .news-table td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--admin-border); font-size: 14px; vertical-align: top; }
    .news-table th { color: #66788c; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
    .news-table img { width: 64px; height: 44px; object-fit: cover; border-radius: 4px; }
    .row-actions { display: flex; gap: 8px; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .empty-state { text-align: center; padding: 40px 0; color: #66788c; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
